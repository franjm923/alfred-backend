<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos - Alfred</title>
    <link rel="stylesheet" href="css/Estilos2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">A</div>
            </div>
            <nav class="nav">
                <a href="Home.html" class="nav-link active">Home</a>
                <a href="Perfil.html" class="nav-link">Perfil</a>
                <a href="Settings.html" class="nav-link">Configuración</a>
            </nav>
            <div class="user-info">
                <img id="avatar" class="user-avatar" src="assets/default-avatar.png" alt="avatar">
                <span id="nombreUsuario" class="user-name">Cargando...</span>
                <button class="btn btn-secondary" onclick="logout()">Salir</button>
            </div>
        </header>

        <main class="main-content">
            <div class="dashboard-grid">
                <section class="card">
                    <div class="card-header">
                        <h2 class="card-title">Próximos turnos</h2>
                    </div>
                    <div class="card-content">
                        <div id="turnos-proximos">Cargando…</div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2 class="card-title">Historial</h2>
                    </div>
                    <div class="card-content">
                        <div id="turnos-historial">Cargando…</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="Js/config.js"></script>
    <script src="Js/auth.js"></script>
    <script src="Js/Home.js"></script>
</body>
</html>
