<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mi perfil — Alfred</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar" data-active=""></aside>

    <div class="app-main">
      <header class="topbar">
        <button class="icon-btn app-menu-btn" id="appMenuBtn" aria-label="Abrir menú">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div class="greet">
          <h1>Mi perfil</h1>
          <p>Gestioná tus datos y la información de tu consultorio</p>
        </div>
        <div class="top-actions" id="topActions"></div>
      </header>

      <div class="app-content">
        <div class="profile-grid">
          <!-- Tarjeta de perfil -->
          <aside class="profile-card">
            <div class="pc-cover"></div>
            <div class="pc-body">
              <div class="pc-avatar">L</div>
              <h3>Dra. Lucía Bravo</h3>
              <div class="pc-role">Clínica médica</div>
              <div class="pc-mat">M.N. 145.880 · Buenos Aires</div>
              <div class="pc-stats">
                <div><div class="n">248</div><div class="l">Pacientes</div></div>
                <div><div class="n">734</div><div class="l">Turnos</div></div>
                <div><div class="n">3 años</div><div class="l">En Alfred</div></div>
              </div>
            </div>
          </aside>

          <!-- Formulario -->
          <section class="form-card">
            <h3>Datos personales</h3>
            <p class="fc-sub">Esta información aparece en tus confirmaciones de turno por WhatsApp.</p>
            <form id="profileForm">
              <div class="form-grid">
                <div class="field">
                  <label for="nombre">Nombre</label>
                  <input type="text" id="nombre" value="Lucía" />
                </div>
                <div class="field">
                  <label for="apellido">Apellido</label>
                  <input type="text" id="apellido" value="Bravo" />
                </div>
                <div class="field">
                  <label for="esp">Especialidad</label>
                  <select id="esp">
                    <option selected>Clínica médica</option>
                    <option>Cardiología</option>
                    <option>Pediatría</option>
                    <option>Dermatología</option>
                    <option>Ginecología</option>
                  </select>
                </div>
                <div class="field">
                  <label for="matricula">Matrícula</label>
                  <input type="text" id="matricula" value="M.N. 145.880" />
                </div>
                <div class="field">
                  <label for="email">Correo electrónico</label>
                  <input type="email" id="email" value="lucia.bravo@consultorio.com" />
                </div>
                <div class="field">
                  <label for="wa">WhatsApp del consultorio</label>
                  <input type="tel" id="wa" value="+54 9 11 5512-0000" />
                </div>
                <div class="field full">
                  <label for="dir">Dirección del consultorio</label>
                  <input type="text" id="dir" value="Av. Santa Fe 2150, Piso 4 — CABA" />
                </div>
                <div class="field full">
                  <label for="bio">Mensaje de bienvenida</label>
                  <textarea id="bio">¡Hola! Soy el asistente de la Dra. Bravo. Te ayudo a coordinar tu turno. ¿Para qué día lo necesitás?</textarea>
                </div>
              </div>
              <div class="form-foot">
                <button type="button" class="btn btn--ghost">Cancelar</button>
                <button type="submit" class="btn btn--primary">Guardar cambios</button>
              </div>
            </form>
          </section>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("profileForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var b = e.target.querySelector('button[type="submit"]');
      var t = b.textContent; b.textContent = "Guardado ✓"; b.disabled = true;
      setTimeout(function () { b.textContent = t; b.disabled = false; }, 1800);
    });
  </script>
</body>
</html>
