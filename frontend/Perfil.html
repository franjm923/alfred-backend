<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Alfred</title>
    <link rel="stylesheet" href="css/Estilos2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">A</div>
            </div>
            <nav class="nav">
                <a href="Home.html" class="nav-link">Home</a>
                <a href="Perfil.html" class="nav-link active">Perfil</a>
                <a href="Settings.html" class="nav-link">Configuración</a>
            </nav>
            <div class="user-info">
                <img id="avatar" class="user-avatar" src="assets/default-avatar.png" alt="avatar">
                <span id="nombreUsuario" class="user-name">Cargando...</span>
                <button class="btn btn-secondary" onclick="logout()">Salir</button>
            </div>
        </header>

        <main class="main-content">
            <div style="margin-bottom: 24px;">
                <h1>Perfil del profesional</h1>
            </div>

            <section class="card">
                <div class="card-content">
                    <dl style="display:grid; grid-template-columns: max-content 1fr; gap:12px 24px; margin:0 0 16px;">
                        <dt style="color: var(--muted, #6b7280);">Nombre</dt>
                        <dd id="campo-nombre" style="margin:0;">—</dd>

                        <dt style="color: var(--muted, #6b7280);">Email</dt>
                        <dd id="campo-email" style="margin:0;">—</dd>

                        <dt style="color: var(--muted, #6b7280);">Estado</dt>
                        <dd id="campo-estado" style="margin:0;">—</dd>
                    </dl>

                    <form id="perfil-form" style="display:grid; gap:8px; max-width:420px;">
                        <input id="input-especialidad" placeholder="Especialidad (ej. Clínica médica)" />
                        <input id="input-matricula" placeholder="Nro de matrícula (ej. MN 12345)" />
                        <div style="display:flex; gap:8px; flex-wrap:wrap;">
                            <button type="submit" class="btn btn-secondary">Guardar perfil</button>
                            <button type="button" id="btn-enviar-verificacion" class="btn btn-primary">Enviar para verificación</button>
                        </div>
                    </form>

                    <p style="margin-top:12px;">
                        <a href="Settings.html">⚙️ Conectar Google Calendar (en Configuración)</a>
                    </p>

                    <div id="perfil-result" style="margin-top:12px; font-size:0.95em;"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="Js/config.js"></script>
    <script src="Js/auth.js"></script>
    <script src="Js/Perfil.js"></script>
</body>
</html>
